name: FrameworkScanner
options:
  bundleIdPrefix: com.eskiyin
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
targets:
  FrameworkScanner:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - Info.plist
          - "Info 2.plist"
          - FrameworkScanner.entitlements
          - "FrameworkScanner 2.entitlements"
        buildPhase: resources
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/FrameworkScanner.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eskiyin.FrameworkScanner
        PRODUCT_NAME: FrameworkScanner
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/FrameworkScanner.entitlements
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        DEPLOYMENT_POSTPROCESSING: YES
        SKIP_INSTALL: NO
